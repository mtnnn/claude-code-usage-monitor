; PlatformIO Project — Claude Code Usage Monitor
; Board target: LilyGo T-Display-S3 (ESP32-S3R8, 16MB flash, 8MB OPI PSRAM)
; Display: ST7789 170x320 over 8-bit PARALLEL (i80) bus — driven via TFT_eSPI.
; (Upstream targeted the Waveshare ESP32-S3-LCD-1.47 which uses SPI; the parallel
;  bus + pin map below is the T-Display-S3 port. See TFT_eSPI Setup206.)

[env:lilygo-t-display-s3]
platform        = espressif32
board           = esp32-s3-devkitm-1
framework       = arduino

; ----- USB & serial -----
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default
; ESP32-S3 native USB-Serial/JTAG drops the CDC connection during the esptool
; stub baud switch ("No serial data received"). Upload over the built-in JTAG
; (OpenOCD) instead — no serial stub, no baud change.
upload_protocol = esp-builtin

; ----- Memory / partitions -----
; The module has 16MB flash + 8MB OPI PSRAM. qio_opi = QIO flash + OPI PSRAM.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.f_flash             = 80000000L
board_build.psram_type          = opi
board_build.f_cpu               = 240000000L
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.partitions          = default_16MB.csv

; ----- Build flags -----
build_flags =
    -DBOARD_HAS_PSRAM
    ; newlib-nano ships without %f in printf/snprintf; pull in the float variant
    ; so ui_fmt_money/ui_fmt_tokens render numbers instead of a bare "f".
    -Wl,-u,_printf_float
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src
    ; ----- TFT_eSPI: LilyGo T-Display-S3 (TFT_eSPI Setup206), 8-bit parallel -----
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DINIT_SEQUENCE_3=1
    -DCGRAM_OFFSET=1
    -DTFT_PARALLEL_8_BIT=1
    -DTFT_RGB_ORDER=TFT_RGB
    -DTFT_INVERSION_ON=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    ; Backlight (GPIO38) is managed by the firmware's ledc PWM, NOT by TFT_eSPI,
    ; so TFT_BL is intentionally left undefined here.

; ----- Dependencies -----
lib_deps =
    lvgl/lvgl@~8.3.10
    bblanchon/ArduinoJson@^7.0.0
    bodmer/TFT_eSPI@^2.5.43

lib_ldf_mode = deep+
